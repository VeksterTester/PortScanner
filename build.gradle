plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.0'
    id 'io.spring.dependency-management' version '1.1.5'
}

group = 'me.vekster'
version = '1.0.1'
java.sourceCompatibility = JavaVersion.VERSION_17

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

// Configure the executable JAR name
tasks.named('bootJar') {
    archiveBaseName = 'portscanner'
    archiveVersion = ''      // No version in filename
    archiveClassifier = ''   // No classifier suffix
    manifest {
        attributes 'Start-Class': 'me.vekster.portscanner.Main'
    }
}

// Disable the plain JAR to avoid duplicate artifacts
tasks.named('jar') {
    enabled = false
}
